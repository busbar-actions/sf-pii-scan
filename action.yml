name: 'Busbar PII Scan'
description: 'Scan extracted Salesforce datasets (CSVs) for PII and secrets, emit findings and SARIF'
author: 'busbar.agency'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  input-path:
    description: 'File or directory to scan. Directories are walked recursively for CSVs.'
    required: true

  severity-threshold:
    description: 'Minimum severity to include in the report. One of: info, low, medium, high, critical.'
    required: false
    default: 'medium'
  fail-on-severity:
    description: 'Exit non-zero if any finding meets or exceeds this severity. Same scale as severity-threshold. Set to "never" to disable.'
    required: false
    default: 'critical'

  config-file:
    description: 'Path to a ValidationConfig JSON (custom patterns, skip lists, entropy thresholds, etc.). Optional.'
    required: false
    default: ''

  report-path:
    description: 'Where to write the findings JSON report.'
    required: false
    default: 'pii-findings.json'
  sarif:
    description: 'Also emit a SARIF report for GitHub Code Scanning integration.'
    required: false
    default: 'true'
  sarif-path:
    description: 'Where to write the SARIF report (only used when sarif=true).'
    required: false
    default: 'pii-findings.sarif'

  upload-sarif:
    description: 'Upload the SARIF report to GitHub Code Scanning (requires security-events: write).'
    required: false
    default: 'true'
  comment-pr:
    description: 'Post a findings summary as a PR comment when running on a pull_request event.'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload the JSON report (and SARIF if generated) as a workflow artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name to give the uploaded artifact.'
    required: false
    default: 'pii-findings'

  version:
    description: 'sf-pii-scan release tag to download (e.g. v0.1.0). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-pii-scan binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  findings-count:
    description: 'Total number of findings at or above the severity threshold.'
    value: ${{ steps.scan.outputs.findings-count }}
  critical-count:
    description: 'Number of Critical-severity findings.'
    value: ${{ steps.scan.outputs.critical-count }}
  high-count:
    description: 'Number of High-severity findings.'
    value: ${{ steps.scan.outputs.high-count }}
  medium-count:
    description: 'Number of Medium-severity findings.'
    value: ${{ steps.scan.outputs.medium-count }}
  threshold-breached:
    description: '"true" if any finding met or exceeded fail-on-severity.'
    value: ${{ steps.scan.outputs.threshold-breached }}
  report-path:
    description: 'Path to the JSON findings report.'
    value: ${{ inputs.report-path }}
  sarif-path:
    description: 'Path to the SARIF report (empty if sarif=false).'
    value: ${{ steps.scan.outputs.sarif-path }}

# The binary owns all logic and UX: it reads its inputs from INPUT_*, computes
# the finding counts, writes GITHUB_OUTPUT, the step summary, annotations and the
# PR-comment body, and exits non-zero when the fail-on threshold is breached.
# This action only installs it, passes inputs through, and wires the three
# GitHub-native publish steps (Code Scanning, artifact, PR comment).
runs:
  using: 'composite'
  steps:
    - name: Set up sf-pii-scan
      uses: busbar-actions/setup@main
      with:
        binary: sf-pii-scan
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Run PII scan
      id: scan
      shell: bash
      env:
        INPUT_INPUT_PATH: ${{ inputs.input-path }}
        INPUT_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_REPORT_PATH: ${{ inputs.report-path }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_SARIF_PATH: ${{ inputs.sarif-path }}
        INPUT_COMMENT_OUTPUT: ${{ runner.temp }}/pii-comment.md
      run: sf-pii-scan

    - name: Upload SARIF to Code Scanning
      if: always() && inputs.sarif == 'true' && inputs.upload-sarif == 'true' && steps.scan.outputs.sarif-path != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}
        category: busbar-pii-scan

    - name: Upload findings artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.report-path }}
          ${{ steps.scan.outputs.sarif-path }}
        if-no-files-found: ignore

    - name: Post PR comment
      if: always() && inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body-file "${RUNNER_TEMP}/pii-comment.md"
