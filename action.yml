name: 'Busbar PII Scan'
description: 'Scan extracted Salesforce datasets (CSVs) for PII and secrets, emit findings and SARIF'
author: 'busbar.agency'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  input-path:
    description: 'File or directory to scan. Directories are walked recursively for CSVs.'
    required: true

  severity-threshold:
    description: 'Minimum severity to include in the report. One of: info, low, medium, high, critical.'
    required: false
    default: 'medium'
  fail-on-severity:
    description: 'Exit non-zero if any finding meets or exceeds this severity. Same scale as severity-threshold. Set to "never" to disable.'
    required: false
    default: 'critical'

  config-file:
    description: 'Path to a ValidationConfig YAML (custom patterns, skip lists, entropy thresholds, etc.). Optional.'
    required: false
    default: ''

  report-path:
    description: 'Where to write the findings JSON report.'
    required: false
    default: 'pii-findings.json'
  sarif:
    description: 'Also emit a SARIF report for GitHub Code Scanning integration.'
    required: false
    default: 'true'
  sarif-path:
    description: 'Where to write the SARIF report (only used when sarif=true).'
    required: false
    default: 'pii-findings.sarif'

  upload-sarif:
    description: 'Upload the SARIF report to GitHub Code Scanning (requires security-events: write).'
    required: false
    default: 'true'
  comment-pr:
    description: 'Post a findings summary as a PR comment when running on a pull_request event.'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload the JSON report (and SARIF if generated) as a workflow artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name to give the uploaded artifact.'
    required: false
    default: 'pii-findings'

  version:
    description: 'busbar-sf release tag to download (e.g. v0.4.2). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the busbar-sf binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  findings-count:
    description: 'Total number of findings at or above the severity threshold.'
    value: ${{ steps.scan.outputs.findings-count }}
  critical-count:
    description: 'Number of Critical-severity findings.'
    value: ${{ steps.scan.outputs.critical-count }}
  high-count:
    description: 'Number of High-severity findings.'
    value: ${{ steps.scan.outputs.high-count }}
  medium-count:
    description: 'Number of Medium-severity findings.'
    value: ${{ steps.scan.outputs.medium-count }}
  threshold-breached:
    description: '"true" if any finding met or exceeded fail-on-severity.'
    value: ${{ steps.scan.outputs.threshold-breached }}
  report-path:
    description: 'Path to the JSON findings report.'
    value: ${{ inputs.report-path }}
  sarif-path:
    description: 'Path to the SARIF report (empty if sarif=false).'
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Resolve release tag
      id: tag
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.version }}" == "latest" ]]; then
          tag=$(gh release view --repo "${{ inputs.binary-repo }}" --json tagName -q .tagName)
        else
          tag="${{ inputs.version }}"
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Determine asset name
      id: asset
      shell: bash
      run: |
        set -euo pipefail
        os="${{ runner.os }}"
        arch="${{ runner.arch }}"
        case "$os-$arch" in
          Linux-X64)   name="busbar-sf-x86_64-unknown-linux-gnu" ;;
          Linux-ARM64) name="busbar-sf-aarch64-unknown-linux-gnu" ;;
          macOS-X64)   name="busbar-sf-x86_64-apple-darwin" ;;
          macOS-ARM64) name="busbar-sf-aarch64-apple-darwin" ;;
          Windows-X64) name="busbar-sf-x86_64-pc-windows-msvc.exe" ;;
          *) echo "::error::Unsupported runner: $os-$arch"; exit 1 ;;
        esac
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Download busbar-sf binary
      shell: bash
      run: |
        set -euo pipefail
        bin_dir="${RUNNER_TEMP}/busbar-sf"
        mkdir -p "$bin_dir"
        gh release download "${{ steps.tag.outputs.tag }}" \
          --repo "${{ inputs.binary-repo }}" \
          --pattern "${{ steps.asset.outputs.name }}" \
          --dir "$bin_dir"
        bin_path="$bin_dir/${{ steps.asset.outputs.name }}"
        chmod +x "$bin_path"
        echo "$bin_dir" >> "$GITHUB_PATH"
        if [[ "$bin_path" != "$bin_dir/busbar-sf" && "$bin_path" != "$bin_dir/busbar-sf.exe" ]]; then
          ext=""
          [[ "${{ runner.os }}" == "Windows" ]] && ext=".exe"
          ln -sf "$bin_path" "$bin_dir/busbar-sf$ext"
        fi
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Run PII scan
      id: scan
      shell: bash
      run: |
        set -euo pipefail
        args=(data scan
          --input "${{ inputs.input-path }}"
          --severity "${{ inputs.severity-threshold }}"
          --output "${{ inputs.report-path }}"
          --format json)

        if [[ "${{ inputs.sarif }}" == "true" ]]; then
          args+=(--sarif "${{ inputs.sarif-path }}")
        fi
        if [[ -n "${{ inputs.config-file }}" ]]; then
          args+=(--config "${{ inputs.config-file }}")
        fi
        if [[ "${{ inputs.fail-on-severity }}" != "never" ]]; then
          args+=(--fail-on "${{ inputs.fail-on-severity }}")
        fi

        # Run the scan. Capture exit status without aborting so we can publish
        # the report even when the threshold is breached.
        set +e
        busbar-sf "${args[@]}"
        scan_exit=$?
        set -e

        # Parse counts from the JSON report.
        if [[ -f "${{ inputs.report-path }}" ]]; then
          total=$(jq 'length' "${{ inputs.report-path }}")
          crit=$(jq '[.[] | select(.severity == "critical")] | length' "${{ inputs.report-path }}")
          high=$(jq '[.[] | select(.severity == "high")] | length' "${{ inputs.report-path }}")
          med=$(jq '[.[] | select(.severity == "medium")] | length' "${{ inputs.report-path }}")
        else
          total=0; crit=0; high=0; med=0
        fi

        echo "findings-count=$total" >> "$GITHUB_OUTPUT"
        echo "critical-count=$crit" >> "$GITHUB_OUTPUT"
        echo "high-count=$high"     >> "$GITHUB_OUTPUT"
        echo "medium-count=$med"    >> "$GITHUB_OUTPUT"

        if [[ "${{ inputs.sarif }}" == "true" ]]; then
          echo "sarif-path=${{ inputs.sarif-path }}" >> "$GITHUB_OUTPUT"
        else
          echo "sarif-path=" >> "$GITHUB_OUTPUT"
        fi

        if [[ $scan_exit -ne 0 ]]; then
          echo "threshold-breached=true" >> "$GITHUB_OUTPUT"
        else
          echo "threshold-breached=false" >> "$GITHUB_OUTPUT"
        fi

        # Stash the exit code for the final gate.
        echo "$scan_exit" > "${RUNNER_TEMP}/scan_exit"

    - name: Upload SARIF to Code Scanning
      if: inputs.sarif == 'true' && inputs.upload-sarif == 'true' && steps.scan.outputs.sarif-path != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}
        category: busbar-pii-scan

    - name: Upload findings artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.report-path }}
          ${{ steps.scan.outputs.sarif-path }}
        if-no-files-found: ignore

    - name: Post PR comment
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPORT: ${{ inputs.report-path }}
        TOTAL: ${{ steps.scan.outputs.findings-count }}
        CRIT: ${{ steps.scan.outputs.critical-count }}
        HIGH: ${{ steps.scan.outputs.high-count }}
        MED:  ${{ steps.scan.outputs.medium-count }}
      run: |
        set -euo pipefail
        if [[ "$TOTAL" == "0" ]]; then
          body=$'### 🛡️ busbar pii-scan\n\nNo findings at or above the configured severity threshold.'
        else
          # Group counts by category for the summary table.
          rows=$(jq -r '
            group_by(.category)
            | map({category: .[0].category, count: length})
            | sort_by(-.count)
            | .[]
            | "| \(.category) | \(.count) |"
          ' "$REPORT" || true)

          body="### 🛡️ busbar pii-scan

**$TOTAL findings** — Critical: $CRIT · High: $HIGH · Medium: $MED

| Category | Count |
|---|---|
$rows

Full report attached as the \`${{ inputs.artifact-name }}\` workflow artifact."
        fi

        gh pr comment "${{ github.event.pull_request.number }}" --body "$body"

    - name: Gate on threshold
      if: steps.scan.outputs.threshold-breached == 'true'
      shell: bash
      run: |
        set -euo pipefail
        echo "::error::PII scan threshold breached (fail-on-severity=${{ inputs.fail-on-severity }})."
        exit "$(cat "${RUNNER_TEMP}/scan_exit")"
